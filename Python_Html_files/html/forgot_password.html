<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Dalalstreet</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 300px;
      background: #222;
      color: white;
      border: 1px solid #444;
    }
    button {
      padding: 10px 20px;
      background: #ffc107;
      color: black;
      border: none;
      cursor: pointer;
    }
    a {
      color: #0af;
    }
  </style>
</head>
<body>
  <h2>Forgot Password</h2>
  {% if message %}<p style="color:lime">{{ message }}</p>{% endif %}
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  <form method="POST">
    <input type="email" name="email" placeholder="Enter your email" required />
    <button type="submit">Send Reset Link</button>
  </form>
  <p><a href="/login">Back to Login</a></p>
</body>
</html>
