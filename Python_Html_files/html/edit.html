<!DOCTYPE html>
<html>
<head>
  <title>Dalal Street AI - Chart</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    #chart { width: 100%; height: 600px; }
  </style>
</head>
<body>

<h2>Stock Chart Viewer</h2>

<select id="symbol">
  <option value="TCS">TCS</option>
  <option value="INFY">INFY</option>
  <option value="RELIANCE">RELIANCE</option>
</select>

<button onclick="loadChart()">Load Chart</button>

<div id="chart"></div>

<script>
  let chart, candleSeries;

  async function loadChart() {
    const symbol = document.getElementById("symbol").value;
    try {
      const candleRes = await fetch(`/api/candles?symbol=${symbol}&interval=1d`);
      const candleData = await candleRes.json();

      const lineRes = await fetch(`/api/52week/${symbol}`);
      const lineData = await lineRes.json();

      if (!Array.isArray(candleData) || !candleData.length) {
        alert("Error fetching chart data.");
        return;
      }

      document.getElementById("chart").innerHTML = "";
      chart = LightweightCharts.createChart(document.getElementById("chart"), {
        width: window.innerWidth - 50,
        height: 600,
      });

      candleSeries = chart.addCandlestickSeries();
      candleSeries.setData(candleData);

      // Add 52-week high line
      if (lineData.high_52) {
        const highLine = chart.addLineSeries({
          color: 'green',
          lineWidth: 1,
          priceLineVisible: true,
        });
        highLine.setData([{ time: candleData[candleData.length - 1].time, value: lineData.high_52 }]);
      }

      // Add 52-week low line
      if (lineData.low_52) {
        const lowLine = chart.addLineSeries({
          color: 'red',
          lineWidth: 1,
          priceLineVisible: true,
        });
        lowLine.setData([{ time: candleData[candleData.length - 1].time, value: lineData.low_52 }]);
      }

    } catch (err) {
      console.error("Chart Error:", err);
      alert("Error fetching chart data.");
    }
  }

  // Load chart when page opens
  window.onload = loadChart;
</script>

</body>
</html>
