<!DOCTYPE html>
<html>
<head>
  <title>Breakout Prediction Chart</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    #chart { width: 100%; height: 600px; }
  </style>
</head>
<body>
  <div id="chart"></div>

  <script>
    fetch('lightweight_breakout_RELIANCE.json')
      .then(res => res.json())
      .then(data => {
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
          width: window.innerWidth * 0.95,
          height: 600,
          layout: { background: { color: '#ffffff' }, textColor: '#000' },
          grid: { vertLines: { color: '#eee' }, horzLines: { color: '#eee' } },
        });

        const candleSeries = chart.addCandlestickSeries();

        const candles = data.map(d => ({
          time: d.time,
          open: d.open,
          high: d.high,
          low: d.low,
          close: d.close
        }));

        candleSeries.setData(candles);

        const markers = [];

        data.forEach(d => {
          if (d.breakout === 1) {
            markers.push({
              time: d.time,
              position: 'aboveBar',
              color: 'green',
              shape: 'circle',
              text: 'Actual'
            });
          }
          if (d.prediction === 1) {
            markers.push({
              time: d.time,
              position: 'belowBar',
              color: 'red',
              shape: 'cross',
              text: 'Predicted'
            });
          }
        });

        candleSeries.setMarkers(markers);
      });
  </script>
</body>
</html>
